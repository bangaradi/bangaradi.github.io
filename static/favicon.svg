<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="4" fill="#1e1e2e"/>
  <!-- Pixel art "A" on a 5x7 grid, each pixel = 4x4, offset to center -->
  <g fill="#cba6f7">
    <!-- Row 1: top of A -->
    <rect x="12" y="2" width="4" height="4"/>
    <rect x="16" y="2" width="4" height="4"/>
    <!-- Row 2 -->
    <rect x="8" y="6" width="4" height="4"/>
    <rect x="20" y="6" width="4" height="4"/>
    <!-- Row 3 -->
    <rect x="8" y="10" width="4" height="4"/>
    <rect x="20" y="10" width="4" height="4"/>
    <!-- Row 4: crossbar -->
    <rect x="8" y="14" width="4" height="4"/>
    <rect x="12" y="14" width="4" height="4"/>
    <rect x="16" y="14" width="4" height="4"/>
    <rect x="20" y="14" width="4" height="4"/>
    <!-- Row 5 -->
    <rect x="8" y="18" width="4" height="4"/>
    <rect x="20" y="18" width="4" height="4"/>
    <!-- Row 6 -->
    <rect x="8" y="22" width="4" height="4"/>
    <rect x="20" y="22" width="4" height="4"/>
    <!-- Row 7: legs -->
    <rect x="4" y="26" width="4" height="4"/>
    <rect x="8" y="26" width="4" height="4"/>
    <rect x="20" y="26" width="4" height="4"/>
    <rect x="24" y="26" width="4" height="4"/>
  </g>
</svg>
